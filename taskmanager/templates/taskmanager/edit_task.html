<!DOCTYPE html>
<html>

<head>

    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="mb-4">

                    Edit Task

                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <input
                        type="text"
                        name="title"
                        class="form-control mb-3"
                        value="{{ task.title }}"
                    >

                    <textarea
                        name="description"
                        class="form-control mb-3"
                    >{{ task.description }}</textarea>

                    <select
                        name="project"
                        class="form-control mb-3"
                    >

                        {% for project in projects %}

                        <option
                            value="{{ project.id }}"

                            {% if project.id == task.project.id %}
                                selected
                            {% endif %}
                        >

                            {{ project.name }}

                        </option>

                        {% endfor %}

                    </select>

                    <select
                        name="assigned_to"
                        class="form-control mb-3"
                    >

                        {% for user in users %}

                        <option
                            value="{{ user.id }}"

                            {% if user.id == task.assigned_to.id %}
                                selected
                            {% endif %}
                        >

                            {{ user.username }}

                        </option>

                        {% endfor %}

                    </select>

                    <select
                        name="status"
                        class="form-control mb-3"
                    >

                        <option
                            value="Pending"

                            {% if task.status == 'Pending' %}
                                selected
                            {% endif %}
                        >
                            Pending
                        </option>

                        <option
                            value="In Progress"

                            {% if task.status == 'In Progress' %}
                                selected
                            {% endif %}
                        >
                            In Progress
                        </option>

                        <option
                            value="Completed"

                            {% if task.status == 'Completed' %}
                                selected
                            {% endif %}
                        >
                            Completed
                        </option>

                    </select>

                    <input
                        type="date"
                        name="due_date"
                        class="form-control mb-3"
                        value="{{ task.due_date|date:'Y-m-d' }}"
                    >

                    <button class="btn btn-primary w-100">

                        Update Task

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
