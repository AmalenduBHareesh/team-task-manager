<!-- edit_task.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f4f7fc;">

<div class="container mt-5">

    <div class="card shadow p-5">

        <h1 class="mb-4">
            Edit Task
        </h1>

        <form method="POST">

            {% csrf_token %}

            <select
                name="project"
                class="form-control mb-3"
            >

                {% for project in projects %}

                <option
                    value="{{ project.id }}"
                    {% if task.project.id == project.id %}selected{% endif %}
                >
                    {{ project.name }}
                </option>

                {% endfor %}

            </select>

            <input
                type="text"
                name="title"
                value="{{ task.title }}"
                class="form-control mb-3"
                required
            >

            <textarea
                name="description"
                class="form-control mb-3"
                rows="5"
            >{{ task.description }}</textarea>

            <select
                name="status"
                class="form-control mb-3"
            >

                <option
                    value="Pending"
                    {% if task.status == 'Pending' %}selected{% endif %}
                >
                    Pending
                </option>

                <option
                    value="In Progress"
                    {% if task.status == 'In Progress' %}selected{% endif %}
                >
                    In Progress
                </option>

                <option
                    value="Completed"
                    {% if task.status == 'Completed' %}selected{% endif %}
                >
                    Completed
                </option>

            </select>

            <input
                type="date"
                name="due_date"
                value="{{ task.due_date|date:'Y-m-d' }}"
                class="form-control mb-3"
            >

            <select
                name="assigned_to"
                class="form-control mb-4"
            >

                {% for user in users %}

                <option
                    value="{{ user.id }}"
                    {% if task.assigned_to.id == user.id %}selected{% endif %}
                >
                    {{ user.username }}
                </option>

                {% endfor %}

            </select>

            <button class="btn btn-primary w-100">
                Update Task
            </button>

        </form>

    </div>

</div>

</body>

</html>
