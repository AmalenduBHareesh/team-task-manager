<!-- signup.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .signup-card{
            width:100%;
            max-width:500px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

<div class="signup-card">

    <h1 class="mb-4 text-center">
        Signup
    </h1>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            class="form-control mb-3"
            placeholder="Username"
            required
        >

        <input
            type="email"
            name="email"
            class="form-control mb-3"
            placeholder="Email"
            required
        >

        <input
            type="password"
            name="password"
            class="form-control mb-4"
            placeholder="Password"
            required
        >

        <button class="btn btn-dark w-100">
            Signup
        </button>

    </form>

    <div class="text-center mt-4">

        Already have an account?

        <a href="/login/">
            Login
        </a>

    </div>

</div>

</body>

</html>
